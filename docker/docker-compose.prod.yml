services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: clinica-api:latest
    container_name: clinica-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      CLINICA_RUN_DB_INIT: "true"
      ConnectionStrings__DefaultConnection: ${SQLSERVER_CONNECTION_STRING}
      Jwt__Issuer: ${JWT_ISSUER:-Clinica}
      Jwt__Audience: ${JWT_AUDIENCE:-Clinica}
      Jwt__Key: ${JWT_KEY}
      Jwt__ExpiresInHours: ${JWT_EXPIRES_HOURS:-8}
      Jwt__RefreshTokenExpiresInDays: ${JWT_REFRESH_DAYS:-7}
      Cors__Origins__0: ${FRONTEND_ORIGIN:-http://localhost:9000}
      Seed__AdminUserName: ${ADMIN_USERNAME:-admin}
      Seed__AdminEmail: ${ADMIN_EMAIL:-admin@clinica.com}
      Seed__AdminPassword: ${ADMIN_PASSWORD}
      Seed__SeedDemoUsers: ${SEED_DEMO_USERS:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - clinica-net
      - infraestructura-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ""
    image: clinica-frontend:latest
    container_name: clinica-frontend
    depends_on:
      - api
    # Sin ports públicos: el acceso es por infraestructura-nginx:9000
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - clinica-net
      - infraestructura-network

networks:
  clinica-net:
    driver: bridge
  infraestructura-network:
    external: true
