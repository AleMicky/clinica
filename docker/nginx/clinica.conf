# Copiar a la infra: infraestructura-nginx/conf.d/clinica.conf
# Y exponer el puerto en docker-compose de infraestructura-nginx:
#   - "9000:9000"

server {
    listen 9000;
    server_name _;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://clinica-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://clinica-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
