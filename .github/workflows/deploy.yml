name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: /opt/clinica/clinica
      SSH_PORT: 22

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || env.SSH_PORT }}
          source: "."
          target: ${{ secrets.VPS_APP_PATH || env.APP_DIR }}
          overwrite: true
          rm: true

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || env.SSH_PORT }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_PATH || env.APP_DIR }}"

            echo "Directorio de despliegue: $APP_DIR"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "Archivos copiados:"
            ls -lah

            chmod +x docker/deploy.sh

            export SKIP_GIT_PULL=1
            ./docker/deploy.sh